{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Projeto GIL{% endblock %} - Gov.br</title>
    
    <!-- Fonte Roboto (Google Fonts) -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    
    <!-- CSS Personalizado -->
    <link rel="stylesheet" href="{% static 'css/govbr.css' %}">
</head>
<body>

    <!-- Header -->
    <header>
        <!-- Barra de Topo -->
        <div class="br-header-top">
            <div class="container header-top-content">
                <div class="gov-brasil-logo">BRASIL</div>
                <div class="acesso-gov">Acesso à informação</div>
            </div>
        </div>

        <!-- Barra Principal -->
        <div class="br-header-main">
            <div class="container header-main-content">
                <div class="main-logo">
                    GOV.BR
                    <span>Projeto GIL</span>
                </div>
            </div>
        </div>
    </header>

    <!-- Conteúdo Principal -->
    <main class="{% block main_class %}container{% endblock %}">
        {% block content %}
        <!-- O conteúdo das páginas entrará aqui -->
        {% endblock %}
    </main>

    <!-- Footer -->
    <footer>
        <div class="container footer-content">
            <div class="footer-column">
                <h3>Navegação</h3>
                <ul>
                    <li><a href="#">Início</a></li>
                    <li><a href="#">Sobre</a></li>
                </ul>
            </div>
            <div class="footer-column">
                <h3>Serviços</h3>
                <ul>
                    <li><a href="#">Consultar Dados</a></li>
                    <li><a href="#">Relatórios</a></li>
                </ul>
            </div>
        </div>
    </footer>

</body>
</html>
