{% extends 'base.html' %}

{% block title %}Novo Registro Financeiro{% endblock %}

{% block content %}
<div class="container" style="padding-top: 20px; padding-bottom: 40px; max-width: 960px;">
    <h2 style="color: var(--color-primary-dark); margin-bottom: 24px;">Adicionar Novo Registro</h2>
    
    <form method="post" novalidate style="border: 1px solid #e0e0e0; padding: 24px; border-radius: 8px; background-color: #fff;">
        {% csrf_token %}
        
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px;">
            {% for field in form %}
            <div class="form-group">
                <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                    <div style="color: red; font-size: 0.8rem; margin-top: 4px;">
                        {{ field.errors.as_ul }}
                    </div>
                {% endif %}
            </div>
            {% endfor %}
        </div>

        <div style="margin-top: 30px; border-top: 1px solid #eee; padding-top: 20px; display: flex; gap: 10px;">
            <button type="submit" class="br-button">Salvar Registro</button>
            <a href="{% url 'geofi:landing' %}" class="br-button secondary" style="text-decoration: none;">Cancelar</a>
        </div>
    </form>
</div>

<style>
    .form-group {
        display: flex;
        flex-direction: column;
    }
    .form-group label {
        margin-bottom: 5px;
        font-weight: 600;
        font-size: 0.9rem;
        color: #333;
    }
    .form-group input, .form-group select, .form-group textarea {
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 1rem;
    }
</style>
{% endblock %}
